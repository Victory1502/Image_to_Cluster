---
- name: Deploy Custom Nginx on K3d
  hosts: localhost
  connection: local
  
  tasks:
    - name: Create deployment
      kubernetes.core.k8s:
        name: custom-nginx
        api_version: apps/v1
        kind: Deployment
        namespace: default
        definition:
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: custom-nginx
            template:
              metadata:
                labels:
                  app: custom-nginx
              spec:
                containers:
                - name: nginx
                  image: custom-nginx:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                  - containerPort: 80
    
    - name: Create NodePort service
      kubernetes.core.k8s:
        name: custom-nginx
        api_version: v1
        kind: Service
        namespace: default
        definition:
          spec:
            selector:
              app: custom-nginx
            type: NodePort
            ports:
            - port: 80
              targetPort: 80
              nodePort: 30080
